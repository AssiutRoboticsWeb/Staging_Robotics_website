<!DOCTYPE html>
<html>

<head>
  <title>OC page</title>
  <link rel="stylesheet" href="OC.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

</head>

<body>
  <div class="head w-100 py-3 mb-4 border-bottom">
    <div class="container-fluid d-flex flex-column flex-md-row align-items-center justify-content-between">
      <div class="d-flex align-items-center mb-3 mb-md-0">
        <img src="../all-images/logo.png" class="sublogo me-3" style="height:48px;">
        <h1 class="h3 mb-0">Lab Components</h1>
      </div>
      <div id="taps" class="d-flex flex-column flex-sm-row">
        <button class="Components btn w-100 w-sm-auto py-3 h-auto btn-primary me-0 me-sm-2 mb-2 mb-sm-0">Manage Components</button>
        <button class="Borrow btn w-100 w-sm-auto py-3 h-auto btn-outline-primary">Manage Borrow System</button>
      </div>
    </div>
  </div>
  <!-- Hidden popup form -->
  <div id="deadlinePopup" class="rounded shadow" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);z-index:10; background:white; padding:20px; border:1px solid #ccc;">
    <h3 class="fs-5">Select deadline date</h3>
    <input type="date" id="deadlineInput" class="form-control mt-4 w-100">
    <div class="d-flex justify-content-end mt-3">
      <button id="deadlineConfirm" class="btn btn-primary me-2">Confirm</button>
      <button id="deadlineCancel" class="btn btn-secondary">Cancel</button>
    </div>
  </div>
  <div class="crud container"></div>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="../config/server-config.js"></script>
  <script type="module" src="OC.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>

</html>
