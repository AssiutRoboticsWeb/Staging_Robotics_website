<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="dashboard-container">
        <header id="header-section">
            <h2 id="header-title" >Tracks</h2>
            <ul id="header-tabs">
                <li class="header-buttons">
                    <button class="add-btn" id="add-track-btn" class="active">All Tracks</button>
                    <button class="add-btn" id="all-announce-tracks-btn">Announcement Tracks</button>
                </li>
                <li class="control-buttons" id="all-tracks-ctrl-btns">
                    <button class="custom-btn" id="custom-back-btn" onclick="backForword(this)"><i class="fa-solid fa-backward-step fa-2xl" style="color: #000000;"></i> </button>
                    <button class="custom-btn" id="custom-add-btn" onclick="addSomething(this)"><i class="fa-solid fa-plus fa-2xl" style="color: #000000;"></i> </button>
                </li>
            </ul>
        </header>
        <main id="core-section">
            <!-- Dynamic content will be rendered here -->
        </main>
    </div>


    <!-- Modal for Add/Edit Track/Course/Task -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-modal">&times;</span>
            <form id="modal-form">
                <div id="modal-fields">
                    <!-- Dynamic form fields will be injected here -->
                </div>
                <button type="submit" id="modal-submit">Save</button>
            </form>
        </div>
    </div>
    <!-- Application Btn & state -->

    <section class="application-section" id="application-section">
        <h2>Application Status</h2>
        <div class="scroll-table">
            <table id="application-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Track Name</th>
                        <th>Student Name</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="application-body">
                    <!-- Dynamic application rows will be injected here -->
                </tbody>
            </table>
        </div>
    </section>










    <button id="application-btn" class="applay-btn">Applications</button>



    <script src="../../config/server-config.js"></script>
    <script src="./main.js"></script>
</body>

</html>
