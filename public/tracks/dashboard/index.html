<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Dashboard</h1>
  <button class="home-btn" onclick="goToHome()">Main Page</button>

  <div class="table-wrap">
    <table id="taskTable">
      <thead>
        <tr>
          <th>Person</th>
          <th>Task</th>
          <th>Course</th>
          <th>Track</th>
          <th>State</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- نافذة التصحيح -->
  <div id="correctionModal" class="modal" aria-hidden="true" role="dialog">
    <div class="modal-content">
      <span class="closeBtn" onclick="closeModal('correctionModal')" aria-label="Close">&times;</span>
      <h2 id="taskTitle">Rate Task</h2>
      <p><strong>Answer Task:</strong></p>
      <p id="taskAnswer"></p>

      <label for="commentInput">Feedback & Comments</label>
      <textarea id="commentInput" rows="3" required placeholder="اكتب ملاحظاتك هنا"></textarea>

      <label for="gradeInput">Rate (0 - 100)</label>
      <input type="number" id="gradeInput" min="0" max="100" required placeholder="مثال: 85"/>

      <button onclick="submitCorrection()" class="home-btn">Send Feedback</button>
      <button class="close-btn-footer" onclick="closeModal('correctionModal')">إغلاق</button>
    </div>
  </div>

  <script src="../../config/server-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
