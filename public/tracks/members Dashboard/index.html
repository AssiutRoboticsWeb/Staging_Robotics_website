<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>لوحة الأعضاء و التاسكات</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>لوحة الأعضاء و التاسكات</h1>
  </header>

  <main class="container">
    <!-- تبويبات التراكات -->
    <nav id="tabs" class="tabs" aria-label="التراكات"></nav>

    <!-- فلاتر عامة (اسم + حالة + Course Filter خارجي) -->
    <section class="filters">
      <div class="field">
        <input id="searchInput" type="search" placeholder="ابحث بالاسم (مثال: فدية)..." aria-label="بحث بالاسم" />
      </div>
      <div class="field">
        <select id="statusFilter" aria-label="فلتر الحالة">
          <option value="">كل الحالات</option>
          <option value="done">منتهي</option>
          <option value="doing">قيد التنفيذ</option>
          <option value="blocked">متوقف</option>
        </select>
      </div>
      <div class="field">
        <select id="courseFilter" aria-label="فلتر الكورس (عام)">
          <!-- يتم تعبئته ديناميكيًا حسب التراك -->
        </select>
      </div>
    </section>

    <!-- بطاقات الأعضاء -->
    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <!-- مودال -->
  <div id="modalRoot"></div>

  <footer class="app-footer">
    <span>© لجنة الويب</span>
  </footer>

  <script src="../../config/server-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
