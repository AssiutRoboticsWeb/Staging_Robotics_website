<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trainee Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Header + Navbar -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="Go to dashboard">Trainee Dashboard</a>
      <nav class="navbar" aria-label="Main navigation">
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="primary-menu">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
        <ul id="primary-menu" class="nav-links">
          <li><a class="nav-link" href="index.html">Dashboard</a></li>
          <li><a class="nav-link" href="ros.html">ROS</a></li>
          <li><a class="nav-link" href="vision.html">Vision</a></li>
          <li><a class="nav-link" href="hardware.html">Hardware</a></li>
          <li><a class="nav-link" href="embedded.html">Embedded</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container">
    <div class="dashboard card">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="completed">Completed Tasks</button>
        <button class="tab-btn" data-tab="ranks">Ranks</button>
      </div>

      <!-- Completed -->
      <section id="completed" class="tab-content active" aria-labelledby="Completed Tasks">
        <h2 class="section-title">Completed Tasks</h2>
        <label for="courseSelect" class="label"><strong>Select Course:</strong></label>
        <select id="courseSelect" aria-label="Select course">
          <option value="">-- Choose a course --</option>
          <option value="Frontend">Frontend</option>
          <option value="Backend">Backend</option>
        </select>

        <div class="table-container" id="completedTable" aria-live="polite" hidden>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Track</th>
                <th>Task</th>
                <th>Hours</th>
                <th>Points</th>
                <th>Task Link</th>
              </tr>
            </thead>
            <tbody id="taskBody"></tbody>
          </table>
        </div>
      </section>

      <!-- Ranks -->
      <section id="ranks" class="tab-content" aria-labelledby="Ranks">
        <h2 class="section-title">Ranks</h2>
        <p class="muted">Selected Course: <span id="selectedCourseForRank">—</span></p>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Points</th>
              </tr>
            </thead>
            <tbody id="rankBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <!-- IMPORTANT: defer -->
  <script src="main.js" defer></script>
</body>

</html>
