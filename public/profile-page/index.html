<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Dashboard</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <!-- Server config (provides API_BASE_URL) -->
  <script src="../config/server-config.js"></script>
</head>

<body class="light-mode loading">
  <header class="disabled">
    <!-- Notifications Sidebar -->
    <aside class="notification-sidebar" id="notificationSidebar" aria-hidden="true">
      <div class="notification-icon" id="notificationBell" aria-label="Open notifications" role="button">🔔
        <span id="notificationCount">0</span>
      </div>
      <h2>Notifications</h2>
      <ul id="notificationList"></ul>
    </aside>
    <div class="overlay" id="overlay"></div>

    <div class="header-content">
      <h1>Member Dashboard</h1>

      <div class="header-buttons">
        <button id="RelatedLinks" class="header-btn" aria-expanded="false" aria-controls="related-links">
          <i class="fas fa-link"></i> Related Links
        </button>
        <!-- Lab Dates/Add Date buttons تُضاف برمجياً حسب الدور واللجنة -->
      </div>

      <!-- Popup: Related Links as Selects (بدون زر) -->
      <div class="disabled" id="related-links" aria-hidden="true">
        <div class="rl-selects">
          <label for="rl-category">Category</label>
          <select id="rl-category"></select>

          <label for="rl-link">Link</label>
          <select id="rl-link"></select>
        </div>
      </div>

      <div class="user-info">
        <div class="avatar-container">
          <img id="userAvatar" alt="User avatar" class="avatar" />
          <button id="changeAvatarBtn" class="change-avatar-btn">
            <i class="fas fa-camera"></i> Change Photo
          </button>
          <input type="file" id="avatarInput" accept="image/*" hidden />
        </div>
        <div>
          <p id="userName" class="user-name"></p>
          <p id="userRole" class="user-role"></p>
        </div>
      </div>
    </div>
  </header>

  <!-- Loader -->
  <div class="bino load">
    <div class="bino_head">
      <div class="eye"></div>
      <div class="eye"></div>
    </div>
  </div>

  <main class="disabled">
    <div class="dashboard-grid">
      <!-- Profile Card -->
      <div class="card profile-card">
        <div class="card-header">
          <i class="icon user-icon"></i>
          <h2>Profile Info</h2>
        </div>
        <div class="profile-info">
          <p><span>Email:</span> <span id="userEmail"></span></p>
          <p><span>Committee:</span> <span id="userCommittee"></span></p>
          <p><span>Phone:</span> <span id="userPhone"></span></p>
          <p><span>Status:</span> <span id="userStatus" class="status-badge"></span></p>
          <p><span>Average Rate:</span> <span id="avgRate" class="status-badge"></span></p>
        </div>
      </div>

      <!-- Current Tasks -->
      <div class="card tasks-card">
        <div class="card-header">
          <i class="icon book-icon"></i>
          <h2>Current Tasks</h2>
        </div>
        <div id="CurrentTasksList" class="tasks-list"></div>
      </div>
    </div>

    <!-- History Tasks -->
    <div class="card history-tasks-card">
      <div class="card-header">
        <i class="icon book-icon"></i>
        <h2>History Tasks</h2>
      </div>
      <div id="HistoryTasksList" class="tasks-list"></div>
    </div>
  </main>

  <!-- Submit Task Modal -->
  <div id="submitTaskModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h2>Submit Task</h2>
      <form id="submitTaskForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="submissionLink">Submission Link:</label>
          <input type="url" id="submissionLink" name="submissionUrl" required />
          <input type="file" name="file" id="file" title="Upload file" />
        </div>
        <div class="form-actions">
          <button type="submit">Submit</button>
          <button type="button" class="cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Dark mode toggle -->
  <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode" aria-pressed="false">
    <i class="icon moon-icon"></i>
  </button>

  <!-- App script -->
  <script src="app.js"></script>
</body>

</html>
